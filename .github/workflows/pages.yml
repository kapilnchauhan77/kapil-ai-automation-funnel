name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static artifact
        run: |
          mkdir -p public/assets public/case
          cp index.html styles.css script.js robots.txt sitemap.xml public/
          # Only ship referenced assets — skip the source PNG and OG template.
          cp assets/audit-checklist.pdf \
             assets/audit-checklist.html \
             assets/og-image.png \
             assets/outreach-hero.webp \
             assets/outreach-hero.jpg \
             public/assets/
          # Publish every case study HTML except files starting with `_`
          # (the master template stays in the repo, never ships).
          shopt -s nullglob
          for f in case/*.html; do
            name=$(basename "$f")
            if [[ "$name" != _* ]]; then
              cp "$f" "public/case/$name"
            fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
